<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Luciérnagas — 100 Agentes Autónomos</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#010302}
    #c{width:100%;height:100%;display:block}
    #hud{position:absolute;top:16px;left:16px;font-family:'Courier New',monospace;
      font-size:11px;color:rgba(170,255,130,.85);pointer-events:none;line-height:2;
      text-shadow:0 0 8px rgba(100,255,60,.5)}
    #hud b{color:rgba(255,255,160,1)}
    #fb{display:inline-block;width:56px;height:5px;background:rgba(255,255,255,.12);
      border-radius:3px;overflow:hidden;vertical-align:middle;margin-left:4px}
    #ff{height:100%;width:0%;background:linear-gradient(90deg,#f40,#fc0,#3f7);border-radius:3px;transition:width .3s}
    #leg{position:absolute;bottom:16px;right:16px;font-family:'Courier New',monospace;
      font-size:10px;color:rgba(130,200,100,.45);pointer-events:none;text-align:right;line-height:2}

    /* ── PANEL DE CONTROL GLOBAL ── */
    #panel{
      position:absolute;top:16px;right:16px;
      font-family:'Courier New',monospace;font-size:11px;
      color:rgba(170,255,130,.9);line-height:2.2;
      background:rgba(0,12,4,.72);border:1px solid rgba(60,200,80,.25);
      border-radius:8px;padding:12px 16px;backdrop-filter:blur(6px);
      text-shadow:0 0 6px rgba(60,200,80,.4);min-width:230px;
    }
    #panel b{color:rgba(255,255,140,1);}
    #panel label{display:flex;align-items:center;gap:8px;cursor:pointer;}
    #panel input[type=range]{
      -webkit-appearance:none;width:110px;height:4px;
      background:rgba(60,200,80,.25);border-radius:2px;outline:none;cursor:pointer;
    }
    #panel input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
      background:rgba(100,255,80,1);box-shadow:0 0 6px rgba(100,255,80,.7);
    }
    #panel select{
      background:rgba(0,20,6,.8);color:rgba(170,255,130,.95);
      border:1px solid rgba(60,200,80,.3);border-radius:4px;
      font-family:'Courier New',monospace;font-size:11px;padding:1px 4px;cursor:pointer;
    }
    #panel .sep{border-top:1px solid rgba(60,200,80,.18);margin:6px 0;}
    #vval,#wxval,#wyval{color:rgba(255,255,140,1);min-width:28px;display:inline-block;}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  ENJAMBRE AUTÓNOMO<br>
  Agentes: <b id="nagHUD">100</b> luciérnagas en vuelo<br>
  FPS: <b id="fps">--</b><span id="fb"><span id="ff"></span></span><br>
  Tiempo: <b id="t">0.0</b>s
</div>
<div id="leg">Drag — Rotar · Scroll — Zoom</div>

<!-- ══ PANEL GLOBAL DE AGENTES ══ -->
<div id="panel">
  <b>⚙ PARÁMETROS GLOBALES</b><br>
  <div class="sep"></div>
  <label>velocidadGlobal
    <input type="range" id="slV" min="0.2" max="4.0" step="0.1" value="1.0">
    <span id="vval">1.0</span>×
  </label>
  <label>límite X/Z
    <input type="range" id="slW" min="5" max="13" step="1" value="13">
    <span id="wxval">13</span>
  </label>
  <label>límite Y
    <input type="range" id="slY" min="3" max="9" step="0.5" value="9">
    <span id="wyval">9.0</span>
  </label>
  <div class="sep"></div>
  modoSalida &nbsp;
  <select id="selM">
    <option value="0">0 — Rebote</option>
    <option value="1">1 — Wraparound</option>
  </select>
  <div class="sep"></div>
  Agentes: <b id="nagval">100</b> activos
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babylonjs/6.26.0/babylon.js"></script>
<script>
"use strict";

// ═══════════════════════════════════════════
// BABYLON SCENE
// ═══════════════════════════════════════════
(function(){
  const canvas=document.getElementById('c');
  const engine=new BABYLON.Engine(canvas,true,{stencil:false,antialias:true});
  const scene=new BABYLON.Scene(engine);
  scene.clearColor=new BABYLON.Color4(.008,.012,.01,1);
  scene.fogMode=BABYLON.Scene.FOGMODE_EXP2;
  scene.fogDensity=.024;
  scene.fogColor=new BABYLON.Color3(.01,.025,.018);

  const cam=new BABYLON.ArcRotateCamera('c',-Math.PI/2.2,Math.PI/2.9,20,new BABYLON.Vector3(0,1.5,0),scene);
  cam.lowerRadiusLimit=5;cam.upperRadiusLimit=40;cam.wheelPrecision=8;
  cam.attachControl(canvas,true);

  const amb=new BABYLON.HemisphericLight('a',new BABYLON.Vector3(0,1,0),scene);
  amb.intensity=.05;amb.diffuse=new BABYLON.Color3(.07,.11,.16);

  function gH(x,z){return Math.sin(x*.2)*Math.cos(z*.2)*.6+Math.sin(x*.05)*.3;}
  const SZ=34;
  const gnd=BABYLON.MeshBuilder.CreateGround('g',{width:SZ,height:SZ,subdivisions:22},scene);
  const gp=gnd.getVerticesData(BABYLON.VertexBuffer.PositionKind);
  for(let i=0;i<gp.length;i+=3)gp[i+1]=gH(gp[i],gp[i+2]);
  gnd.updateVerticesData(BABYLON.VertexBuffer.PositionKind,gp);
  const gn=[];BABYLON.VertexData.ComputeNormals(gp,gnd.getIndices(),gn);
  gnd.setVerticesData(BABYLON.VertexBuffer.NormalKind,gn);
  const gm=new BABYLON.StandardMaterial('gm',scene);
  gm.diffuseColor=new BABYLON.Color3(.03,.055,.02);gm.specularColor=BABYLON.Color3.Black();
  gnd.material=gm;

  [[-8,-7],[7,-9],[-9,5],[9,6],[0,-11],[-5,9],[6,8],[-11,-1]].forEach(([x,z],i)=>{
    const gy=gH(x,z),h=3+Math.random()*2;
    const tM=new BABYLON.StandardMaterial('t'+i,scene);
    tM.diffuseColor=new BABYLON.Color3(.08,.05,.03);tM.specularColor=BABYLON.Color3.Black();
    const tr=BABYLON.MeshBuilder.CreateCylinder('tr'+i,{height:h,diameterTop:.12,diameterBottom:.22,tessellation:5},scene);
    tr.position.set(x,gy+h/2,z);tr.material=tM;
    const lM=new BABYLON.StandardMaterial('l'+i,scene);
    lM.diffuseColor=new BABYLON.Color3(.02,.05,.015);lM.specularColor=BABYLON.Color3.Black();
    for(let j=0;j<3;j++){
      const s=BABYLON.MeshBuilder.CreateSphere('s'+i+'_'+j,{diameter:(1.3+Math.random()*.5)*2,segments:3},scene);
      s.position.set(x+(Math.random()-.5)*.7,gy+h+Math.random()*.6,z+(Math.random()-.5)*.7);
      s.material=lM;
    }
  });

  const fp=BABYLON.MeshBuilder.CreateGround('fp',{width:SZ,height:SZ},scene);
  fp.position.y=.65;
  const fm=new BABYLON.StandardMaterial('fm',scene);
  fm.diffuseColor=new BABYLON.Color3(.02,.07,.04);fm.emissiveColor=new BABYLON.Color3(.005,.015,.01);
  fm.alpha=.18;fm.backFaceCulling=false;fp.material=fm;

  const gl=new BABYLON.GlowLayer('gl',scene);
  gl.intensity=2.3;gl.blurKernelSize=18;

  // ═══════════════════════════════════════════════════════════════
  // PARÁMETROS GLOBALES
  // ═══════════════════════════════════════════════════════════════
  const GLOBAL = { velocidadGlobal: 1.0, limitesXZ: 13, limitesY: 9.0, modoSalida: 0 };

  const slV  = document.getElementById('slV');
  const slW  = document.getElementById('slW');
  const slY  = document.getElementById('slY');
  const selM = document.getElementById('selM');
  const vval = document.getElementById('vval');
  const wxval= document.getElementById('wxval');
  const wyval= document.getElementById('wyval');

  slV.addEventListener('input', ()=>{ GLOBAL.velocidadGlobal=+slV.value; vval.textContent=slV.value; });
  slW.addEventListener('input', ()=>{ GLOBAL.limitesXZ=+slW.value; wxval.textContent=slW.value; });
  slY.addEventListener('input', ()=>{ GLOBAL.limitesY=+slY.value; wyval.textContent=(+slY.value).toFixed(1); });
  selM.addEventListener('change',()=>{ GLOBAL.modoSalida=+selM.value; });

  // ═══════════════════════════════════════════════════════════════
  // AGENTES AUTÓNOMOS — 100 agentes
  // ═══════════════════════════════════════════════════════════════
  const NUM_AGENTS = 100;

  const SPECIES = [
    { name:'Libélula',   body:[.04,.12,.10], glow:[.0, .9, .8],  sx:.32,sy:.10,sz:.55, spdBase:.028 },
    { name:'Polilla',    body:[.10,.08,.04], glow:[.9, .7, .1],  sx:.22,sy:.18,sz:.30, spdBase:.016 },
    { name:'Escarabajo', body:[.06,.04,.02], glow:[.6, .3, .0],  sx:.20,sy:.14,sz:.28, spdBase:.012 },
    { name:'Mosca',      body:[.08,.08,.06], glow:[.3, .9, .3],  sx:.12,sy:.09,sz:.18, spdBase:.038 },
    { name:'Mariposa',   body:[.05,.03,.08], glow:[.6, .2, .9],  sx:.38,sy:.08,sz:.28, spdBase:.019 },
    { name:'Abeja',      body:[.10,.09,.02], glow:[.95,.80,.0],  sx:.14,sy:.10,sz:.22, spdBase:.030 },
    { name:'Cigarra',    body:[.05,.07,.03], glow:[.4, .9, .4],  sx:.18,sy:.12,sz:.30, spdBase:.013 },
    { name:'Luciérnaga', body:[.03,.08,.03], glow:[.2, 1.0,.1],  sx:.15,sy:.10,sz:.20, spdBase:.022 },
    { name:'Grillo',     body:[.07,.06,.02], glow:[.8, .5, .0],  sx:.16,sy:.11,sz:.24, spdBase:.017 },
    { name:'Ciervo',     body:[.08,.05,.03], glow:[.7, .3, .1],  sx:.28,sy:.12,sz:.34, spdBase:.014 },
  ];

  const AGENT_DEFS = Array.from({ length: NUM_AGENTS }, (_, i) => {
    const sp = SPECIES[i % SPECIES.length];
    const col = i % 10, row = Math.floor(i / 10);
    const cellW = 24 / 10;
    const px = -12 + col * cellW + (Math.random() - .5) * cellW * 0.85;
    const pz = -12 + row * cellW + (Math.random() - .5) * cellW * 0.85;
    const py = 0.6 + Math.random() * 8.0;
    const angXZ = (i / NUM_AGENTS) * Math.PI * 2 + (Math.random() - .5) * 0.4;
    const angY  = (Math.random() - .5) * 0.25;
    const spd   = sp.spdBase * (0.85 + Math.random() * 0.30);
    return { ...sp, px, py, pz, angXZ, angY, spd };
  });

  document.getElementById('nagval').textContent = NUM_AGENTS;
  document.getElementById('nagHUD').textContent  = NUM_AGENTS;

  const YMN_AG = 0.4;

  const agents = AGENT_DEFS.map((def, idx) => {
    const mesh = BABYLON.MeshBuilder.CreateSphere('ag'+idx,
      {diameterX:def.sx, diameterY:def.sy, diameterZ:def.sz, segments:3}, scene);
    const agmat = new BABYLON.StandardMaterial('agm'+idx, scene);
    agmat.diffuseColor  = new BABYLON.Color3(...def.body);
    agmat.emissiveColor = new BABYLON.Color3(...def.glow).scale(.65);
    agmat.specularColor = BABYLON.Color3.Black();
    mesh.material = agmat;

    const light = (idx % 3 === 0)
      ? new BABYLON.PointLight('agl'+idx, new BABYLON.Vector3(def.px, def.py, def.pz), scene)
      : null;
    if (light) {
      light.diffuse   = new BABYLON.Color3(...def.glow);
      light.intensity = 0.35;
      light.range     = 3.5;
    }

    const cosE = Math.cos(def.angY);
    const vx0  = Math.cos(def.angXZ) * cosE * def.spd;
    const vy0  = Math.sin(def.angY)          * def.spd;
    const vz0  = Math.sin(def.angXZ) * cosE * def.spd;

    mesh.position.set(def.px, def.py, def.pz);
    mesh.rotation.y = -def.angXZ;
    mesh.rotation.z =  def.angY * 1.5;

    return { mesh, light,
      px:def.px, py:def.py, pz:def.pz,
      vx:vx0, vy:vy0, vz:vz0,
      spd:def.spd,
      bobFreq:   0.5  + idx * 0.18,
      bobPh:     idx  * 1.27,
      curveFreq: 0.11 + idx * 0.047,
      curvePh:   idx  * 2.39,
    };
  });

  function updateAgents(dt, t) {
    const VG  = GLOBAL.velocidadGlobal;
    const XLg = GLOBAL.limitesXZ;
    const YMX = GLOBAL.limitesY;
    const modo= GLOBAL.modoSalida;

    agents.forEach((ag, idx) => {
      ag.px += ag.vx * VG * dt * 60;
      ag.py += ag.vy * VG * dt * 60 + Math.sin(t * ag.bobFreq + ag.bobPh) * 0.0014 * dt * 60;
      ag.pz += ag.vz * VG * dt * 60;

      if (modo === 0) {
        if (ag.px < -XLg) { ag.px = -XLg; ag.vx =  Math.abs(ag.vx); }
        if (ag.px >  XLg) { ag.px =  XLg; ag.vx = -Math.abs(ag.vx); }
        if (ag.pz < -XLg) { ag.pz = -XLg; ag.vz =  Math.abs(ag.vz); }
        if (ag.pz >  XLg) { ag.pz =  XLg; ag.vz = -Math.abs(ag.vz); }
        if (ag.py < YMN_AG) { ag.py = YMN_AG; ag.vy =  Math.abs(ag.vy); }
        if (ag.py > YMX)    { ag.py = YMX;    ag.vy = -Math.abs(ag.vy); }
      } else {
        if (ag.px < -XLg) ag.px =  XLg;
        if (ag.px >  XLg) ag.px = -XLg;
        if (ag.pz < -XLg) ag.pz =  XLg;
        if (ag.pz >  XLg) ag.pz = -XLg;
        if (ag.py < YMN_AG) ag.py = YMX;
        if (ag.py > YMX)    ag.py = YMN_AG;
      }

      const turnXZ = Math.sin(t * ag.curveFreq + ag.curvePh) * 0.0008;
      const turnY  = Math.cos(t * ag.curveFreq * 0.7 + ag.curvePh) * 0.00015;
      const cosT = Math.cos(turnXZ), sinT = Math.sin(turnXZ);
      const nvx = ag.vx * cosT - ag.vz * sinT;
      const nvz = ag.vx * sinT + ag.vz * cosT;
      ag.vx = nvx; ag.vz = nvz;
      ag.vy += turnY;
      const sp3D = Math.sqrt(ag.vx*ag.vx + ag.vy*ag.vy + ag.vz*ag.vz) || ag.spd;
      const kk = ag.spd / sp3D;
      ag.vx *= kk; ag.vy *= kk; ag.vz *= kk;

      ag.mesh.position.set(ag.px, ag.py, ag.pz);
      ag.mesh.rotation.y = -Math.atan2(ag.vz, ag.vx);
      ag.mesh.rotation.z =  ag.vy * 14;

      if (ag.light) {
        const pulse = .5 + .5 * Math.sin(t * (0.9 + idx * .41) + idx * 2.1);
        ag.light.position.set(ag.px, ag.py, ag.pz);
        ag.light.intensity = 0.22 + pulse * 0.44;
      }
    });
  }

  let elapsed=0,ht=0;
  const fpsEl=document.getElementById('fps'),ffEl=document.getElementById('ff'),tEl=document.getElementById('t');

  engine.runRenderLoop(()=>{
    const dt=Math.min(engine.getDeltaTime()*.001,.05);
    elapsed+=dt;ht+=dt;

    updateAgents(dt,elapsed);

    if(ht>=.2){
      ht=0;
      const fps=engine.getFps();
      fpsEl.textContent=fps.toFixed(0);
      tEl.textContent=elapsed.toFixed(1);
      ffEl.style.width=Math.min(100,(fps/60)*100)+'%';
    }

    scene.render();
  });
  window.addEventListener('resize',()=>engine.resize());
})();
</script>
</body>
</html>
